name: Daily Stock Screener

on:
  schedule:
    # 8:30 AM IST = 03:00 UTC, Mon-Fri
    - cron: "0 3 * * 1-5"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab too

jobs:
  run-screener:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run screener
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
        run: node scripts/screener.js
